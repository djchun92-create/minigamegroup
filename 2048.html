<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
      user-select: none;
    }

    .home-btn {
      position: fixed;
      top: 14px;
      left: 18px;
      color: #aaa;
      text-decoration: none;
      font-size: 0.85rem;
      background: rgba(15,52,96,0.7);
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: color 0.2s;
      z-index: 100;
    }
    .home-btn:hover { color: #fff; }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 8px;
      color: #ffd54f;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .top-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 14px;
    }

    .score-box {
      background: #16213e;
      border-radius: 10px;
      padding: 8px 18px;
      text-align: center;
      min-width: 80px;
    }
    .score-box .label { font-size: 0.72rem; color: #888; letter-spacing: 1px; }
    .score-box .val   { font-size: 1.3rem; font-weight: 700; color: #ffd54f; }

    .new-btn {
      padding: 8px 20px;
      background: transparent;
      border: 2px solid #ffd54f;
      color: #ffd54f;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .new-btn:hover { background: #ffd54f; color: #1a1a2e; }

    :root {
      --tile: 100px;
      --gap: 10px;
      --pad: 10px;
      --fs-lg: 2rem;
      --fs-md: 1.5rem;
      --fs-sm: 1.1rem;
      --fs-xs: 1rem;
    }

    .board-wrap {
      background: #0f3460;
      border-radius: 12px;
      padding: var(--pad);
      touch-action: none;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, var(--tile));
      grid-template-rows: repeat(4, var(--tile));
      gap: var(--gap);
    }

    .tile {
      width: var(--tile);
      height: var(--tile);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      transition: background 0.1s;
    }

    .tile-0    { background: rgba(255,255,255,0.06); }
    .tile-2    { background: #eee4da; color: #776e65; font-size: var(--fs-lg); }
    .tile-4    { background: #ede0c8; color: #776e65; font-size: var(--fs-lg); }
    .tile-8    { background: #f2b179; color: #fff;    font-size: var(--fs-lg); }
    .tile-16   { background: #f59563; color: #fff;    font-size: var(--fs-lg); }
    .tile-32   { background: #f67c5f; color: #fff;    font-size: var(--fs-md); }
    .tile-64   { background: #f65e3b; color: #fff;    font-size: var(--fs-md); }
    .tile-128  { background: #edcf72; color: #fff;    font-size: var(--fs-md); }
    .tile-256  { background: #edcc61; color: #fff;    font-size: var(--fs-md); }
    .tile-512  { background: #edc850; color: #fff;    font-size: var(--fs-md); }
    .tile-1024 { background: #edc53f; color: #fff;    font-size: var(--fs-sm); }
    .tile-2048 { background: #edc22e; color: #fff;    font-size: var(--fs-sm); }
    .tile-high { background: #3c3a32; color: #f9f6f2; font-size: var(--fs-xs); }

    .tile.new { animation: pop 0.15s ease; }
    @keyframes pop { 0%{transform:scale(0.5)} 60%{transform:scale(1.08)} 100%{transform:scale(1)} }

    .hint { margin-top: 14px; color: #555; font-size: 0.82rem; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }
    .overlay.hidden { display: none; }
    .overlay-box {
      background: #16213e;
      border: 2px solid #ffd54f;
      border-radius: 16px;
      padding: 36px 48px;
      text-align: center;
      width: min(90vw, 360px);
    }
    .overlay-box h2 { font-size: 1.8rem; margin-bottom: 12px; color: #ffd54f; }
    .overlay-box p  { color: #aaa; margin-bottom: 24px; }
    .overlay-box button {
      padding: 12px 32px;
      background: #f9a825;
      border: none;
      border-radius: 24px;
      color: #1a1a2e;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 48px;
    }
    .overlay-box button:hover { opacity: 0.85; }

    @media (max-width: 480px) {
      :root {
        --tile: clamp(62px, calc((100vw - 60px) / 4), 100px);
        --gap: 8px;
        --pad: 8px;
        --fs-lg: clamp(1.1rem, 5vw, 2rem);
        --fs-md: clamp(0.95rem, 4vw, 1.5rem);
        --fs-sm: clamp(0.8rem, 3.5vw, 1.1rem);
        --fs-xs: clamp(0.7rem, 3vw, 1rem);
      }
      h1 { font-size: 1.8rem; }
      .top-row { gap: 10px; }
      .score-box { padding: 6px 12px; min-width: 65px; }
      .score-box .val { font-size: 1.1rem; }
      .new-btn { padding: 8px 14px; font-size: 0.8rem; }
      .hint { display: none; }
      .overlay-box { padding: 28px 24px; }
    }
  </style>
</head>
<body>

<a href="index.html" class="home-btn">← 홈으로</a>

<h1>2048</h1>

<div class="top-row">
  <div class="score-box">
    <div class="label">SCORE</div>
    <div class="val" id="score">0</div>
  </div>
  <button class="new-btn" onclick="newGame()">새 게임</button>
  <div class="score-box">
    <div class="label">BEST</div>
    <div class="val" id="best">0</div>
  </div>
</div>

<div class="board-wrap">
  <div class="board" id="board"></div>
</div>
<p class="hint">방향키로 타일 이동 · 모바일: 스와이프</p>

<div class="overlay hidden" id="overlay">
  <div class="overlay-box">
    <h2 id="ov-title"></h2>
    <p id="ov-msg"></p>
    <button onclick="newGame(); document.getElementById('overlay').classList.add('hidden')">다시 하기</button>
  </div>
</div>

<script>
  let grid, score, best = 0, won = false;

  function newGame() {
    grid = Array.from({length: 4}, () => Array(4).fill(0));
    score = 0; won = false;
    document.getElementById('score').textContent = 0;
    document.getElementById('overlay').classList.add('hidden');
    addTile(); addTile();
    render();
  }

  function addTile() {
    const empty = [];
    for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) if (!grid[r][c]) empty.push([r, c]);
    if (!empty.length) return;
    const [r, c] = empty[Math.floor(Math.random() * empty.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    return [r, c];
  }

  function render(newPos) {
    const board = document.getElementById('board');
    board.innerHTML = '';
    for (let r = 0; r < 4; r++) {
      for (let c = 0; c < 4; c++) {
        const v = grid[r][c];
        const tile = document.createElement('div');
        const cls = v === 0 ? 'tile-0' : v <= 2048 ? 'tile-' + v : 'tile-high';
        tile.className = 'tile ' + cls;
        if (newPos && newPos[0] === r && newPos[1] === c) tile.classList.add('new');
        if (v) tile.textContent = v;
        board.appendChild(tile);
      }
    }
  }

  function slideRow(row) {
    let r = row.filter(v => v);
    let gained = 0;
    for (let i = 0; i < r.length - 1; i++) {
      if (r[i] === r[i + 1]) {
        r[i] *= 2;
        gained += r[i];
        r[i + 1] = 0;
        i++;
      }
    }
    r = r.filter(v => v);
    while (r.length < 4) r.push(0);
    return { row: r, gained };
  }

  function move(dir) {
    const prev = JSON.stringify(grid);
    let gained = 0;

    if (dir === 'left') {
      for (let r = 0; r < 4; r++) {
        const res = slideRow(grid[r]);
        grid[r] = res.row; gained += res.gained;
      }
    } else if (dir === 'right') {
      for (let r = 0; r < 4; r++) {
        const res = slideRow([...grid[r]].reverse());
        grid[r] = res.row.reverse(); gained += res.gained;
      }
    } else if (dir === 'up') {
      for (let c = 0; c < 4; c++) {
        const col = grid.map(row => row[c]);
        const res = slideRow(col);
        for (let r = 0; r < 4; r++) grid[r][c] = res.row[r];
        gained += res.gained;
      }
    } else if (dir === 'down') {
      for (let c = 0; c < 4; c++) {
        const col = grid.map(row => row[c]).reverse();
        const res = slideRow(col);
        const newCol = res.row.reverse();
        for (let r = 0; r < 4; r++) grid[r][c] = newCol[r];
        gained += res.gained;
      }
    }

    if (JSON.stringify(grid) === prev) return;

    score += gained;
    if (score > best) { best = score; document.getElementById('best').textContent = best; }
    document.getElementById('score').textContent = score;

    const newPos = addTile();
    render(newPos);

    if (!won && grid.some(r => r.some(v => v === 2048))) {
      won = true;
      setTimeout(() => {
        document.getElementById('ov-title').textContent = '🎉 2048 달성!';
        document.getElementById('ov-msg').textContent = `점수: ${score}점 · 계속하려면 새 게임!`;
        document.getElementById('overlay').classList.remove('hidden');
      }, 200);
    } else if (!canMove()) {
      setTimeout(() => {
        document.getElementById('ov-title').textContent = '게임 오버';
        document.getElementById('ov-msg').textContent = `최종 점수: ${score}점`;
        document.getElementById('overlay').classList.remove('hidden');
      }, 200);
    }
  }

  function canMove() {
    for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) {
      if (!grid[r][c]) return true;
      if (r < 3 && grid[r][c] === grid[r+1][c]) return true;
      if (c < 3 && grid[r][c] === grid[r][c+1]) return true;
    }
    return false;
  }

  document.addEventListener('keydown', e => {
    const map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down' };
    if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
  });

  let tx = 0, ty = 0;
  const boardWrap = document.querySelector('.board-wrap');
  boardWrap.addEventListener('touchstart', e => {
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
  }, { passive: false });
  boardWrap.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });
  boardWrap.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) < 15 && Math.abs(dy) < 15) return;
    if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
    else move(dy > 0 ? 'down' : 'up');
  }, { passive: false });

  newGame();
</script>
</body>
</html>
