<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뱀 게임</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    .home-btn {
      position: fixed;
      top: 14px;
      left: 18px;
      color: #aaa;
      text-decoration: none;
      font-size: 0.85rem;
      background: rgba(15,52,96,0.7);
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: color 0.2s;
      z-index: 100;
    }
    .home-btn:hover { color: #fff; }

    h1 {
      font-size: 2rem;
      margin-bottom: 12px;
      letter-spacing: 2px;
      color: #81c784;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 14px;
      font-size: 1rem;
    }

    .stat { display: flex; align-items: center; gap: 6px; }
    .stat span:first-child { font-size: 1.3rem; }

    #score-val, #hi-val { font-weight: 700; font-size: 1.1rem; color: #81c784; }

    .reset-btn {
      padding: 6px 20px;
      background: transparent;
      border: 2px solid #81c784;
      color: #81c784;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .reset-btn:hover { background: #81c784; color: #1a1a2e; }

    canvas {
      border: 2px solid #16213e;
      border-radius: 8px;
      background: #0f1923;
      display: block;
    }

    .speed-btns {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .speed-btns button {
      padding: 5px 16px;
      border: 2px solid #81c784;
      background: transparent;
      color: #81c784;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.82rem;
      transition: all 0.2s;
    }
    .speed-btns button:hover,
    .speed-btns button.active { background: #81c784; color: #1a1a2e; }

    .hint {
      margin-top: 14px;
      color: #555;
      font-size: 0.82rem;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }
    .overlay.hidden { display: none; }

    .overlay-box {
      background: #16213e;
      border: 2px solid #81c784;
      border-radius: 16px;
      padding: 36px 48px;
      text-align: center;
    }

    .overlay-box h2 { font-size: 1.8rem; margin-bottom: 12px; color: #81c784; }
    .overlay-box p  { color: #aaa; margin-bottom: 24px; font-size: 1rem; }
    .overlay-box button {
      padding: 10px 32px;
      background: #81c784;
      border: none;
      border-radius: 24px;
      color: #1a1a2e;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .overlay-box button:hover { opacity: 0.85; }
  </style>
</head>
<body>

<a href="index.html" class="home-btn">← 홈으로</a>

<h1>🐍 뱀 게임</h1>

<div class="speed-btns">
  <button onclick="setSpeed('slow')" id="btn-slow">느림</button>
  <button onclick="setSpeed('normal')" id="btn-normal" class="active">보통</button>
  <button onclick="setSpeed('fast')" id="btn-fast">빠름</button>
</div>

<div class="status-bar">
  <div class="stat"><span>🍎</span><span id="score-val">0</span></div>
  <button class="reset-btn" onclick="startGame()">새 게임</button>
  <div class="stat"><span>🏆</span><span id="hi-val">0</span></div>
</div>

<canvas id="canvas" width="400" height="400"></canvas>
<p class="hint">방향키로 이동 · 모바일: 화면 스와이프</p>

<div class="overlay hidden" id="overlay">
  <div class="overlay-box">
    <h2 id="ov-title">게임 오버</h2>
    <p id="ov-msg"></p>
    <button onclick="startGame(); document.getElementById('overlay').classList.add('hidden')">다시 하기</button>
  </div>
</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const CELL = 20;
  const COLS = canvas.width  / CELL;
  const ROWS = canvas.height / CELL;

  const SPEEDS = { slow: 180, normal: 120, fast: 70 };
  let speed = 'normal';
  let snake, dir, nextDir, food, score, hiScore = 0, running, intervalId;

  function setSpeed(s) {
    speed = s;
    document.querySelectorAll('.speed-btns button').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + s).classList.add('active');
    if (running) { clearInterval(intervalId); intervalId = setInterval(tick, SPEEDS[speed]); }
  }

  function startGame() {
    snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    document.getElementById('score-val').textContent = 0;
    running = true;
    placeFood();
    clearInterval(intervalId);
    intervalId = setInterval(tick, SPEEDS[speed]);
    draw();
  }

  function placeFood() {
    const occupied = new Set(snake.map(s => s.x + ',' + s.y));
    let pos;
    do { pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) }; }
    while (occupied.has(pos.x + ',' + pos.y));
    food = pos;
  }

  function tick() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
    if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      document.getElementById('score-val').textContent = score;
      if (score > hiScore) { hiScore = score; document.getElementById('hi-val').textContent = hiScore; }
      placeFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function draw() {
    ctx.fillStyle = '#0f1923';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,canvas.height); ctx.stroke(); }
    for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(canvas.width,y*CELL); ctx.stroke(); }

    // food
    ctx.fillStyle = '#e94560';
    ctx.beginPath();
    ctx.arc(food.x*CELL + CELL/2, food.y*CELL + CELL/2, CELL/2 - 2, 0, Math.PI*2);
    ctx.fill();

    // snake
    snake.forEach((seg, i) => {
      const ratio = 1 - i / snake.length * 0.6;
      ctx.fillStyle = `rgba(129, 199, 132, ${ratio})`;
      const pad = i === 0 ? 1 : 2;
      ctx.beginPath();
      ctx.roundRect(seg.x*CELL + pad, seg.y*CELL + pad, CELL - pad*2, CELL - pad*2, 4);
      ctx.fill();

      if (i === 0) {
        ctx.fillStyle = '#1a1a2e';
        const ex = seg.x*CELL + CELL/2 + dir.y*3;
        const ey = seg.y*CELL + CELL/2 - dir.x*3;
        ctx.beginPath(); ctx.arc(ex - dir.x*3, ey - dir.y*3, 2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex + dir.x*3, ey + dir.y*3, 2, 0, Math.PI*2); ctx.fill();
      }
    });
  }

  function gameOver() {
    clearInterval(intervalId);
    running = false;
    document.getElementById('ov-title').textContent = '게임 오버 💀';
    document.getElementById('ov-msg').textContent = `점수: ${score}점 · 최고 기록: ${hiScore}점`;
    document.getElementById('overlay').classList.remove('hidden');
  }

  document.addEventListener('keydown', e => {
    const map = {
      ArrowUp:    { x:  0, y: -1 },
      ArrowDown:  { x:  0, y:  1 },
      ArrowLeft:  { x: -1, y:  0 },
      ArrowRight: { x:  1, y:  0 },
    };
    if (!map[e.key]) return;
    e.preventDefault();
    const d = map[e.key];
    if (d.x === -dir.x && d.y === -dir.y) return;
    nextDir = d;
  });

  // touch swipe
  let tx = 0, ty = 0;
  canvas.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive: true });
  canvas.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) > Math.abs(dy)) {
      const d = dx > 0 ? { x:1,y:0 } : { x:-1,y:0 };
      if (d.x !== -dir.x) nextDir = d;
    } else {
      const d = dy > 0 ? { x:0,y:1 } : { x:0,y:-1 };
      if (d.y !== -dir.y) nextDir = d;
    }
  }, { passive: true });

  startGame();
</script>
</body>
</html>
